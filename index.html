    <style>

        body{
            background-color: rgb(32, 32, 32);
            color: rgb(32, 32, 32);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }
        a{
            text-decoration: none
        }
        button {
        margin: 10px;
        align-items: center;
        background-image: linear-gradient(144deg, #680000, #7c0000 50%, #c00000);
        border: 0;
        border-radius: 8px;
        box-shadow: rgba(252, 65, 65, 0.2) 0 15px 30px -5px;
        box-sizing: border-box;
        color: #ffffff;
        display: flex;
        font-size: 18px;
        justify-content: center;
        line-height: 1em;
        max-width: 100%;
        min-width: 140px;
        padding: 3px;
        text-decoration: none;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        white-space: nowrap;
        cursor: pointer;
        transition: all 0.3s;
        }

        button:active,
        button:hover {
        outline: 0;
        }

        button span {
        background-color: rgb(45, 5, 5);
        padding: 16px 24px;
        border-radius: 6px;
        width: 100%;
        height: 100%;
        transition: 300ms;
        }

        button:hover span {
        background: none;
        }

        button:active {
        transform: scale(0.9);
        }


    </style>
